      #     import pathlib
      #     import re
      #     import sys
      #
      #     text = pathlib.Path("/tmp/backend-pytest-collect.txt").read_text(encoding="utf-8")
      #     match = re.search(r"=+\s+(\d+)\s+tests collected", text)
      #     if not match:
      #         print("Unable to parse pytest collection output", file=sys.stderr)
      #         sys.exit(1)
      #     collected = int(match.group(1))
      #     print(f"Collected backend tests: {collected}")
      #     if collected < 100:
      #         print("Collected test count is unexpectedly low", file=sys.stderr)
      #         sys.exit(1)
      #     PY
      #
      # - name: Run full backend test suite
      #   working-directory: backend
      #   run: pytest -v --tb=short --cov=src --cov-report= --cov-report=xml:coverage.xml
      #
      # - name: Print backend coverage percent
      #   working-directory: backend
      #   run: |
      #     python - <<'PY'
