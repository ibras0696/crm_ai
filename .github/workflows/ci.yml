name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  infra-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.exposed.yml config -q
          docker compose -f docker-compose.yml --profile infra-debug config -q
          docker compose -f docker-compose.yml -f docker-compose.exposed.yml --profile infra-debug config -q
          docker compose -f docker-compose.prod.yml config -q

      - name: Build and start infra + background workers
        run: |
          docker compose -f docker-compose.yml --profile dev up -d --build \
            db redis rabbitmq minio bootstrap api celery_worker celery_beat

      - name: Wait for worker/beat readiness
        run: |
          for i in {1..20}; do
            if docker compose -f docker-compose.yml ps --format '{{.Name}} {{.Status}}' celery_worker celery_beat | grep -Eiq 'healthy|Up'; then
              sleep 3
            fi
            W=$(docker compose -f docker-compose.yml ps --format '{{.Status}}' celery_worker || true)
            B=$(docker compose -f docker-compose.yml ps --format '{{.Status}}' celery_beat || true)
            echo "worker=$W"
            echo "beat=$B"
            if echo "$W" | grep -qi "healthy\|Up" && echo "$B" | grep -qi "healthy\|Up"; then
              break
            fi
            sleep 3
          done

      - name: Celery/RabbitMQ smoke checks
        run: |
          docker compose -f docker-compose.yml exec -T celery_worker sh -lc "celery -A src.infrastructure.celery_app inspect ping -t 5 | grep -q OK"
          docker compose -f docker-compose.yml exec -T celery_beat sh -lc "ps aux | grep -q '[c]elery.*beat'"
          docker compose -f docker-compose.yml exec -T api python - <<'PY'
          from src.modules.schedule.tasks import dispatch_schedule_reminders
          from src.modules.billing.tasks import process_billing_lifecycle
          a = dispatch_schedule_reminders.delay().id
          b = process_billing_lifecycle.delay().id
          print(a, b)
          PY
          sleep 5
          docker compose -f docker-compose.yml logs --since=1m celery_worker | grep -E "dispatch_schedule_reminders|process_billing_lifecycle"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color --timestamps

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # ─── Backend tests ───
  backend-lint-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      DATABASE_URL_SYNC: postgresql+psycopg2://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-pipeline
      TESTING: "true"
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: crm-files
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Start MinIO for docs storage tests
        run: |
          docker run -d --name ci-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-01-20T14-49-07Z \
            server /data --console-address ":9001"
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs ci-minio
          exit 1

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src/ tests/

      - name: Guard broad except (modules)
        working-directory: backend
        run: python tools/check_broad_except.py --root src/modules --whitelist tools/broad_except_whitelist.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Verify full backend test discovery
        working-directory: backend
        run: |
          pytest --collect-only -q > /tmp/backend-pytest-collect.txt
          tail -n 20 /tmp/backend-pytest-collect.txt
          python - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("/tmp/backend-pytest-collect.txt").read_text(encoding="utf-8")
          match = re.search(r"=+\s+(\d+)\s+tests collected", text)
          if not match:
              print("Unable to parse pytest collection output", file=sys.stderr)
              sys.exit(1)
          collected = int(match.group(1))
          print(f"Collected backend tests: {collected}")
          if collected < 100:
              print("Collected test count is unexpectedly low", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run full backend test suite
        working-directory: backend
        run: pytest -v --tb=short --cov=src --cov-report= --cov-report=xml:coverage.xml

      - name: Print backend coverage percent
        working-directory: backend
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          coverage = float(root.attrib["line-rate"]) * 100
          print(f"Coverage: {coverage:.2f}%")
          PY

      - name: Stop MinIO
        if: always()
        run: docker rm -f ci-minio || true

  # ─── Frontend build ───
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  backend-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Dependency CVE audit (high+)
        working-directory: backend
        run: pip-audit --strict

  frontend-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Dependency CVE audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  # ─── Docker build validation ───
  docker-build:
    needs: [infra-compose-smoke, backend-lint-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t crm-api:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t crm-frontend:${{ github.sha }} -f ./frontend/Dockerfile.prod ./frontend

  # ─── CD: Deploy with auto-rollback ───
  deploy:
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Save current state for rollback
            docker compose -f docker-compose.prod.yml ps --format json > /tmp/pre_deploy_state.json || true
            git stash || true
            PREV_COMMIT=$(git rev-parse HEAD)

            # Pull latest code
            git fetch origin main
            git checkout main
            git pull origin main

            # Build and deploy
            docker compose -f docker-compose.prod.yml build --no-cache api frontend
            docker compose -f docker-compose.prod.yml up -d

            # Wait for containers to stabilize
            echo "Waiting 30s for containers to stabilize..."
            sleep 30

            # Health check
            HEALTHY=true
            for svc in api frontend db redis celery_worker celery_beat; do
              STATUS=$(docker compose -f docker-compose.prod.yml ps --format '{{.Status}}' $svc 2>/dev/null || echo "missing")
              if echo "$STATUS" | grep -qiE "exit|dead|restart|missing"; then
                echo "UNHEALTHY: $svc — $STATUS"
                HEALTHY=false
              else
                echo "OK: $svc — $STATUS"
              fi
            done

            # API endpoint health check
            API_STATUS=$(curl -sf http://localhost:8000/api/health | jq -r '.status' 2>/dev/null || echo "error")
            if [ "$API_STATUS" != "ok" ] && [ "$API_STATUS" != "degraded" ]; then
              echo "API health check failed: $API_STATUS"
              HEALTHY=false
            fi

            if ! curl -sf http://localhost:5173/ >/dev/null; then
              echo "Frontend health check failed"
              HEALTHY=false
            else
              echo "Frontend HTTP check OK"
            fi

            if [ "$HEALTHY" = false ]; then
              echo "=== ROLLBACK: reverting to $PREV_COMMIT ==="
              git checkout $PREV_COMMIT
              docker compose -f docker-compose.prod.yml build --no-cache api frontend
              docker compose -f docker-compose.prod.yml up -d
              echo "Rollback complete. Waiting 20s..."
              sleep 20
              exit 1
            fi

            echo "Deploy successful!"
