name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  dependency-pin-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Enforce pinned dependencies policy
        run: python scripts/check_dependency_pins.py

  infra-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.exposed.yml config -q
          docker compose -f docker-compose.yml --profile infra-debug config -q
          docker compose -f docker-compose.yml -f docker-compose.exposed.yml --profile infra-debug config -q
          docker compose -f docker-compose.prod.yml config -q

      - name: Build and start infra
        run: |
          docker compose -f docker-compose.yml --profile dev up -d --build \
            db redis rabbitmq minio migrate api

      - name: API smoke check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --no-color --tail=200 api migrate
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color --timestamps

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # ─── Backend tests ───
  backend-lint-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      DATABASE_URL_SYNC: postgresql+psycopg2://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-pipeline
      TESTING: "true"
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: crm-files
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Start MinIO for docs storage tests
        run: |
          docker run -d --name ci-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-01-20T14-49-07Z \
            server /data --console-address ":9001"
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs ci-minio
          exit 1

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src/ tests/

      - name: Guard broad except (modules)
        working-directory: backend
        run: python tools/check_broad_except.py --root src/modules --whitelist tools/broad_except_whitelist.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Backend pytest temporarily skipped
        working-directory: backend
        run: echo "Backend pytest collection/test suite/coverage temporarily skipped."

      # TODO: Restore backend pytest checks after temporary skip.
      # - name: Verify full backend test discovery
      #   working-directory: backend
      #   run: |
      #     pytest --collect-only -q > /tmp/backend-pytest-collect.txt
      #     tail -n 20 /tmp/backend-pytest-collect.txt
