# High Availability configuration for production
# PostgreSQL Replication + Redis Sentinel + RabbitMQ Cluster

name: crm_chechen_ha

x-backend-env: &backend_env
  POSTGRES_USER: ${POSTGRES_USER:-crm_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
  POSTGRES_DB: ${POSTGRES_DB:-crm_db}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://crm_user:crm_password@db_primary:5432/crm_db}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://crm_user:crm_password@db_primary:5432/crm_db}
  DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL:-postgresql+asyncpg://crm_user:crm_password@db_replica:5432/crm_db}
  REDIS_SENTINEL_HOSTS: ${REDIS_SENTINEL_HOSTS:-redis_sentinel_1:26379,redis_sentinel_2:26379,redis_sentinel_3:26379}
  REDIS_MASTER_NAME: ${REDIS_MASTER_NAME:-mymaster}
  RABBITMQ_NODES: ${RABBITMQ_NODES:-rabbitmq_1,rabbitmq_2,rabbitmq_3}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://crm_rabbit:rabbit_password@rabbitmq_1:5672/}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-crm_minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio_password}
  S3_BUCKET: ${S3_BUCKET:-crm-files}
  SECRET_KEY: ${SECRET_KEY:-dev_secret_key_min_32_characters_long}
  JWT_USER_SECRET_KEY: ${JWT_USER_SECRET_KEY:-dev_jwt_user_secret_key_min_32_chars}
  JWT_SUPERADMIN_SECRET_KEY: ${JWT_SUPERADMIN_SECRET_KEY:-dev_jwt_superadmin_secret_key_min_32}

services:
  # PostgreSQL Primary (Master)
  db_primary:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_REPLICATION_MODE: master
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl_password}
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./scripts/postgres/primary_init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # PostgreSQL Replica (Standby)
  db_replica:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_REPLICATION_MODE: slave
      POSTGRES_MASTER_HOST: db_primary
      POSTGRES_MASTER_PORT: 5432
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl_password}
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      db_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # Redis Master
  redis_master:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - crm_network

  # Redis Replica
  redis_replica:
    image: redis:7-alpine
    restart: always
    command: redis-server --slaveof redis_master 6379 --masterauth ${REDIS_PASSWORD:-redis_password} --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_replica_data:/data
    depends_on:
      - redis_master
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - crm_network

  # Redis Sentinel 1
  redis_sentinel_1:
    image: redis:7-alpine
    restart: always
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./monitoring/redis/sentinel.conf:/etc/redis/sentinel.conf
      - redis_sentinel_1_data:/data
    ports:
      - "26379:26379"
    depends_on:
      - redis_master
      - redis_replica
    networks:
      - crm_network

  # Redis Sentinel 2
  redis_sentinel_2:
    image: redis:7-alpine
    restart: always
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./monitoring/redis/sentinel.conf:/etc/redis/sentinel.conf
      - redis_sentinel_2_data:/data
    ports:
      - "26380:26379"
    depends_on:
      - redis_master
      - redis_replica
    networks:
      - crm_network

  # Redis Sentinel 3
  redis_sentinel_3:
    image: redis:7-alpine
    restart: always
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./monitoring/redis/sentinel.conf:/etc/redis/sentinel.conf
      - redis_sentinel_3_data:/data
    ports:
      - "26381:26379"
    depends_on:
      - redis_master
      - redis_replica
    networks:
      - crm_network

  # RabbitMQ Node 1
  rabbitmq_1:
    image: rabbitmq:3.13-management-alpine
    restart: always
    hostname: rabbitmq_1
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_change_me}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-crm_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit_password}
    volumes:
      - rabbitmq_1_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crm_network

  # RabbitMQ Node 2
  rabbitmq_2:
    image: rabbitmq:3.13-management-alpine
    restart: always
    hostname: rabbitmq_2
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_change_me}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-crm_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit_password}
    volumes:
      - rabbitmq_2_data:/var/lib/rabbitmq
      - ./scripts/rabbitmq/join_cluster.sh:/docker-entrypoint.d/join_cluster.sh
    ports:
      - "5673:5672"
      - "15673:15672"
    depends_on:
      rabbitmq_1:
        condition: service_healthy
    networks:
      - crm_network

  # RabbitMQ Node 3
  rabbitmq_3:
    image: rabbitmq:3.13-management-alpine
    restart: always
    hostname: rabbitmq_3
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_change_me}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-crm_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit_password}
    volumes:
      - rabbitmq_3_data:/var/lib/rabbitmq
      - ./scripts/rabbitmq/join_cluster.sh:/docker-entrypoint.d/join_cluster.sh
    ports:
      - "5674:5672"
      - "15674:15672"
    depends_on:
      rabbitmq_1:
        condition: service_healthy
    networks:
      - crm_network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-crm_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crm_network

  # Bootstrap (DB initialization)
  bootstrap:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: python -m src.cli.bootstrap
    environment:
      <<: *backend_env
    depends_on:
      db_primary:
        condition: service_healthy
    networks:
      - crm_network

  # API (with HA database support)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      <<: *backend_env
      ENABLE_READ_REPLICA: "true"
    depends_on:
      db_primary:
        condition: service_healthy
      db_replica:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis_master:
        condition: service_healthy
      rabbitmq_1:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/readiness', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - crm_network

  # Celery Workers (multiple for HA)
  celery_worker_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app worker -Q high,default --loglevel=info -c 4
    environment:
      <<: *backend_env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - crm_network

  celery_worker_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app worker -Q default,low --loglevel=info -c 8
    environment:
      <<: *backend_env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - crm_network

  # Celery Beat (scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app beat --loglevel=info
    environment:
      <<: *backend_env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - crm_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - crm_network

  # Monitoring
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - crm_network

  grafana:
    image: grafana/grafana:11.2.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - crm_network

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_master_data:
  redis_replica_data:
  redis_sentinel_1_data:
  redis_sentinel_2_data:
  redis_sentinel_3_data:
  rabbitmq_1_data:
  rabbitmq_2_data:
  rabbitmq_3_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  crm_network:
    driver: bridge
