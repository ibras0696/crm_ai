name: crm_chechen

x-default-logging: &default_logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-backend-env: &backend_env
  POSTGRES_USER: ${POSTGRES_USER:-CHANGE_ME_DB_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DB_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-CHANGE_ME_DB_NAME}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://CHANGE_ME_DB_USER:CHANGE_ME_DB_PASSWORD@db:5432/CHANGE_ME_DB_NAME}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://CHANGE_ME_DB_USER:CHANGE_ME_DB_PASSWORD@db:5432/CHANGE_ME_DB_NAME}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://CHANGE_ME_RABBIT_USER:CHANGE_ME_RABBIT_PASSWORD@rabbitmq:5672/}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-CHANGE_ME_S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-CHANGE_ME_S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET:-crm-files}
  SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_SECRET_KEY_MIN_32}
  JWT_USER_SECRET_KEY: ${JWT_USER_SECRET_KEY:-CHANGE_ME_JWT_USER_SECRET_KEY_MIN_32}
  JWT_SUPERADMIN_SECRET_KEY: ${JWT_SUPERADMIN_SECRET_KEY:-CHANGE_ME_JWT_SUPERADMIN_SECRET_KEY_MIN_32}
  JWT_ISSUER: ${JWT_ISSUER:-crm-platform}
  JWT_AUDIENCE_USER: ${JWT_AUDIENCE_USER:-crm-api-users}
  JWT_AUDIENCE_SUPERADMIN: ${JWT_AUDIENCE_SUPERADMIN:-crm-api-superadmin}
  DOMAIN: ${DOMAIN:-CHANGE_ME_DOMAIN}
  FRONTEND_URL: ${FRONTEND_URL:-https://CHANGE_ME_DOMAIN}
  CORS_ORIGINS: ${CORS_ORIGINS:-["https://CHANGE_ME_DOMAIN"]}
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-production}

  ENABLE_AI: ${ENABLE_AI:-true}
  ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
  ENABLE_METRICS: ${ENABLE_METRICS:-true}
  ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-true}
  RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}

  OPENAI_BEARER_TOKEN: ${OPENAI_BEARER_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-jemini-3-flash}
  AI_BASE_URL: ${AI_BASE_URL:-https://agent.timeweb.cloud/api/v1/cloud-ai/agents/289156bc-4adc-4be8-94cf-6767a704a80c/v1}
  AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-openai_compatible}
  AI_MAX_TOKENS_PER_REQUEST: ${AI_MAX_TOKENS_PER_REQUEST:-2000}
  AI_MAX_TOKENS_PER_DAY_PER_ORG: ${AI_MAX_TOKENS_PER_DAY_PER_ORG:-20000}
  AI_RPM_PER_USER: ${AI_RPM_PER_USER:-30}

  DB_POOL_TIMEOUT_S: ${DB_POOL_TIMEOUT_S:-10}
  DB_POOL_RECYCLE_S: ${DB_POOL_RECYCLE_S:-1800}
  DB_HEALTH_TIMEOUT_S: ${DB_HEALTH_TIMEOUT_S:-2}
  REDIS_HEALTH_TIMEOUT_S: ${REDIS_HEALTH_TIMEOUT_S:-2}
  API_WORKERS: ${API_WORKERS:-4}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
  SUPERADMIN_PASSWORD_HASH: ${SUPERADMIN_PASSWORD_HASH:-}
  SUPERADMIN_ACCESS_COOKIE_NAME: ${SUPERADMIN_ACCESS_COOKIE_NAME:-sa_access_token}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
  AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
  AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
  AUTH_COOKIE_PATH: ${AUTH_COOKIE_PATH:-/}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-CHANGE_ME_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-CHANGE_ME_DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    cpus: "1.5"
    mem_limit: "1536m"
    logging: *default_logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    cpus: "0.75"
    mem_limit: "512m"
    logging: *default_logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-CHANGE_ME_RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-CHANGE_ME_RABBIT_PASSWORD}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    cpus: "1.0"
    mem_limit: "1024m"
    logging: *default_logging
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    expose:
      - "9100"
    cpus: "0.25"
    mem_limit: "128m"
    logging: *default_logging

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-CHANGE_ME_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-CHANGE_ME_S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    cpus: "1.0"
    mem_limit: "1024m"
    logging: *default_logging
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  bootstrap:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: python -m src.cli.bootstrap
    environment:
      <<: *backend_env
    cpus: "0.5"
    mem_limit: "512m"
    logging: *default_logging
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *backend_env
    cpus: "2.0"
    mem_limit: "2048m"
    logging: *default_logging
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/readiness', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-4}

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app worker --loglevel=info
    environment:
      <<: *backend_env
    cpus: "1.5"
    mem_limit: "1536m"
    logging: *default_logging
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.infrastructure.celery_app inspect ping -t 5 | grep -q 'OK'"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app beat --loglevel=info
    environment:
      <<: *backend_env
    cpus: "0.75"
    mem_limit: "768m"
    logging: *default_logging
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${FRONTEND_URL:-https://CHANGE_ME_DOMAIN}
    restart: always
    cpus: "0.5"
    mem_limit: "512m"
    logging: *default_logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN:-CHANGE_ME_DOMAIN}
    command: /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    cpus: "0.5"
    mem_limit: "512m"
    logging: *default_logging
    depends_on:
      certbot_init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

  certbot_init:
    image: certbot/certbot:v2.11.0
    restart: "no"
    ports:
      - "80:80"
    volumes:
      - certbot_conf:/etc/letsencrypt
    command: >
      certonly --standalone --preferred-challenges http --non-interactive --agree-tos
      --email ${LETSENCRYPT_EMAIL:-admin@CHANGE_ME_DOMAIN}
      -d ${DOMAIN:-CHANGE_ME_DOMAIN}
    logging: *default_logging

  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    cpus: "0.25"
    mem_limit: "256m"
    logging: *default_logging

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    cpus: "1.0"
    mem_limit: "1024m"
    logging: *default_logging

  grafana:
    image: grafana/grafana:11.2.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-CHANGE_ME_GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-CHANGE_ME_GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    cpus: "0.75"
    mem_limit: "768m"
    logging: *default_logging
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
  prometheusdata:
  grafanadata:
  certbot_www:
  certbot_conf:
