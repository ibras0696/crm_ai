name: crm_chechen_prod

x-backend-env: &backend_env
  POSTGRES_USER: ${POSTGRES_USER:-CHANGE_ME_DB_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DB_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-crm_db}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://CHANGE_ME_DB_USER:CHANGE_ME_DB_PASSWORD@db:5432/crm_db}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://CHANGE_ME_DB_USER:CHANGE_ME_DB_PASSWORD@db:5432/crm_db}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://CHANGE_ME_RABBIT_USER:CHANGE_ME_RABBIT_PASSWORD@rabbitmq:5672/}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-CHANGE_ME_S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-CHANGE_ME_S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET:-crm-files}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_VERIFY_SSL: ${S3_VERIFY_SSL:-true}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_SECRET_KEY_MIN_32}
  JWT_USER_SECRET_KEY: ${JWT_USER_SECRET_KEY:-CHANGE_ME_JWT_USER_SECRET_KEY_MIN_32}
  JWT_SUPERADMIN_SECRET_KEY: ${JWT_SUPERADMIN_SECRET_KEY:-CHANGE_ME_JWT_SUPERADMIN_SECRET_KEY_MIN_32}
  JWT_ISSUER: ${JWT_ISSUER:-crm-platform}
  JWT_AUDIENCE_USER: ${JWT_AUDIENCE_USER:-crm-api-users}
  JWT_AUDIENCE_SUPERADMIN: ${JWT_AUDIENCE_SUPERADMIN:-crm-api-superadmin}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000"]}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

  ENABLE_AI: ${ENABLE_AI:-true}
  ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
  ENABLE_METRICS: ${ENABLE_METRICS:-true}
  ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-true}
  RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}

  OPENAI_BEARER_TOKEN: ${OPENAI_BEARER_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
  AI_BASE_URL: ${AI_BASE_URL:-https://agent.timeweb.cloud/api/v1/cloud-ai/agents/289156bc-4adc-4be8-94cf-6767a704a80c/v1}
  AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-openai_compatible}

  AI_MAX_TOKENS_PER_REQUEST: ${AI_MAX_TOKENS_PER_REQUEST:-2000}
  AI_MAX_TOKENS_PER_DAY_PER_ORG: ${AI_MAX_TOKENS_PER_DAY_PER_ORG:-20000}
  AI_RPM_PER_USER: ${AI_RPM_PER_USER:-30}
  EXPOSE_API_DOCS_IN_PROD: ${EXPOSE_API_DOCS_IN_PROD:-false}

  DB_POOL_TIMEOUT_S: ${DB_POOL_TIMEOUT_S:-10}
  DB_POOL_RECYCLE_S: ${DB_POOL_RECYCLE_S:-1800}
  DB_HEALTH_TIMEOUT_S: ${DB_HEALTH_TIMEOUT_S:-2}
  REDIS_HEALTH_TIMEOUT_S: ${REDIS_HEALTH_TIMEOUT_S:-2}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
  SUPERADMIN_PASSWORD_HASH: ${SUPERADMIN_PASSWORD_HASH:-}
  SUPERADMIN_ACCESS_COOKIE_NAME: ${SUPERADMIN_ACCESS_COOKIE_NAME:-sa_access_token}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
  AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
  AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
  AUTH_COOKIE_PATH: ${AUTH_COOKIE_PATH:-/}
  DOMAIN: ${DOMAIN:-localhost}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
  TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}

  SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-CRM Platform}
  SMTP_TLS: ${SMTP_TLS:-true}
  SMTP_TIMEOUT_S: ${SMTP_TIMEOUT_S:-10}
  ENABLE_EMAIL: ${ENABLE_EMAIL:-true}

  DOCS_ONLYOFFICE_ENABLED: ${DOCS_ONLYOFFICE_ENABLED:-true}
  DOCS_ONLYOFFICE_DOCUMENT_SERVER_URL: ${DOCS_ONLYOFFICE_DOCUMENT_SERVER_URL:-http://onlyoffice:80}
  DOCS_ONLYOFFICE_DOCUMENT_SERVER_INTERNAL_URL: ${DOCS_ONLYOFFICE_DOCUMENT_SERVER_INTERNAL_URL:-http://onlyoffice:80}
  DOCS_ONLYOFFICE_JWT_SECRET: ${DOCS_ONLYOFFICE_JWT_SECRET:-your-jwt-secret-key-change-in-production}
  DOCS_ONLYOFFICE_CALLBACK_URL: ${DOCS_ONLYOFFICE_CALLBACK_URL:-http://api:8000/api/v1/docs/integrations/onlyoffice/callback}
  DOCS_ONLYOFFICE_EDITOR_LANG: ${DOCS_ONLYOFFICE_EDITOR_LANG:-ru}
  YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
  YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
  YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-http://localhost:5173/billing/success}
  YOOKASSA_WEBHOOK_URL: ${YOOKASSA_WEBHOOK_URL:-}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-CHANGE_ME_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      default:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      default:
        aliases:
          - redis

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-CHANGE_ME_RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-CHANGE_ME_RABBIT_PASSWORD}
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-CHANGE_ME_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-CHANGE_ME_S3_SECRET_KEY}
    volumes:
      - minio_data_prod:/data
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      default:
        aliases:
          - minio

  onlyoffice:
    image: onlyoffice/documentserver:7.5.1
    restart: always
    ports:
      - "${ONLYOFFICE_BIND_HOST:-127.0.0.1}:${ONLYOFFICE_BIND_PORT:-8082}:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${DOCS_ONLYOFFICE_JWT_SECRET:-your-jwt-secret-key-change-in-production}
      JWT_HEADER: "Authorization"
      JWT_PAYLOAD_PAYLOAD: "payload"
    volumes:
      - onlyoffice_data_prod:/var/www/onlyoffice/Data
      - onlyoffice_logs_prod:/var/log/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - onlyoffice

  bootstrap:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: python -m src.cli.bootstrap
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/readiness', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      default:
        aliases:
          - api

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app worker --loglevel=info --without-gossip --without-mingle
    environment:
      <<: *backend_env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    stop_grace_period: 30s

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.celery_app beat --loglevel=info --schedule /var/run/celery/celerybeat-schedule
    environment:
      <<: *backend_env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/celery/celerybeat-schedule || kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    stop_grace_period: 30s
    volumes:
      - celery_beat_state_prod:/var/run/celery

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  # Nginx service is assumed to be configured externally or via a separate compose file for ingress
  # to avoid conflicts with local folder structures.

networks:
  default:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_IPV6_SUBNET:-fd00:dead:beef::/64}

volumes:
  pg_data_prod:
  redis_data_prod:
  rabbitmq_data_prod:
  minio_data_prod:
  onlyoffice_data_prod:
  onlyoffice_logs_prod:
  celery_beat_state_prod:
