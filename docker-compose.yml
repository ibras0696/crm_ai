name: crm_chechen

x-backend-env: &backend_env
  POSTGRES_USER: ${POSTGRES_USER:-crm_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
  POSTGRES_DB: ${POSTGRES_DB:-crm_db}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@db:5432/${POSTGRES_DB:-crm_db}}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@db:5432/${POSTGRES_DB:-crm_db}}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-crm_rabbit}:${RABBITMQ_PASS:-crm_rabbit_pass}@rabbitmq:5672/}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET: ${S3_BUCKET:-crm-files}
  SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-prod}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000"]}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

  ENABLE_AI: ${ENABLE_AI:-true}
  ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
  ENABLE_METRICS: ${ENABLE_METRICS:-true}
  ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-true}

  OPENAI_BEARER_TOKEN: ${OPENAI_BEARER_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
  AI_BASE_URL: ${AI_BASE_URL:-https://agent.timeweb.cloud/api/v1/cloud-ai/agents/289156bc-4adc-4be8-94cf-6767a704a80c/v1}

  AI_MAX_TOKENS_PER_REQUEST: ${AI_MAX_TOKENS_PER_REQUEST:-2000}
  AI_MAX_TOKENS_PER_DAY_PER_ORG: ${AI_MAX_TOKENS_PER_DAY_PER_ORG:-20000}
  AI_RPM_PER_USER: ${AI_RPM_PER_USER:-30}

  DB_POOL_TIMEOUT_S: ${DB_POOL_TIMEOUT_S:-10}
  DB_POOL_RECYCLE_S: ${DB_POOL_RECYCLE_S:-1800}
  DB_HEALTH_TIMEOUT_S: ${DB_HEALTH_TIMEOUT_S:-2}
  REDIS_HEALTH_TIMEOUT_S: ${REDIS_HEALTH_TIMEOUT_S:-2}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-crm_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-crm_rabbit_pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    # By default this exports metrics about the container's view of the system.
    # If you need real host metrics on Linux servers, we can switch to host mounts.
    expose:
      - "9100"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    # Note: MinIO image may not include curl; keep healthcheck optional.

  bootstrap:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: python -m src.cli.bootstrap
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/readiness', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./backend:/app
    command: sh entrypoint.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
      API_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["dev"]
    command: celery -A src.infrastructure.celery_app worker --loglevel=info
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["dev"]
    command: celery -A src.infrastructure.celery_app beat --loglevel=info
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
