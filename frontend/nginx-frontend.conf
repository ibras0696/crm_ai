server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    set $csp_nonce $request_id;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: https://s3.twcstorage.ru https://*.twcstorage.ru; media-src 'self' data: blob: https://s3.twcstorage.ru https://*.twcstorage.ru; font-src 'self' data: https:; connect-src 'self' ws: wss: https://s3.twcstorage.ru https://*.twcstorage.ru; form-action 'self'" always;

    sub_filter_types text/html;
    sub_filter_once off;
    sub_filter '<script ' '<script nonce="$csp_nonce" ';

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
