# LiveKit SFU configuration — production.
# API keys are injected via LIVEKIT_KEYS in docker-compose; do not store real keys here.
port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 52000
  port_range_end: 52100
  use_external_ip: true
  enable_loopback_candidate: false

logging:
  json: false
  level: info

turn:
  enabled: true
  # Dedicated DNS-only subdomain that resolves straight to the host (not Cloudflare),
  # so clients can reach the embedded TURN/TURNS server directly. crm.py-it.ru is
  # Cloudflare-proxied and cannot relay TURN, which starved calls of relay candidates.
  domain: "turn.py-it.ru"
  tls_port: 5349
  cert_file: /etc/letsencrypt/live/turn.py-it.ru/fullchain.pem
  key_file: /etc/letsencrypt/live/turn.py-it.ru/privkey.pem
  udp_port: 3478
  relay_range_start: 52101
  relay_range_end: 52200
  external_tls: false

# Room defaults
room:
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 100

# Webhooks require API key injection in config. Keep disabled until a non-secret
# generated config is mounted or LiveKit webhook auth is wired through env safely.
